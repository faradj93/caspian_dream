            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                ([entry]) => {
                    if (entry.isIntersecting) {
                    setIsVisible(true);
                    observer.unobserve(entry.target);
                    }
                },
                { threshold: 0.1 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, []);

            return (
                <div ref={ref} className={`${className} ${isVisible ? 'animate-fade-in-up' : 'opacity-0'}`} style={{ animationDelay: `${delay}ms` }}>
                {children}

            );

                            <div className="group h-full bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 flex flex-col">
                            <div className="h-56 overflow-hidden relative">
                                {/* Вернул логику для локальных файлов туров */}
                                <img 
                                src={
                                    tour.id === 1 ? "tour-baku.jpg" :
                                    tour.id === 2 ? "tour-sheki.jpg" :
                                    tour.id === 3 ? "tour-gabala.jpg" :
                                    "tour-gobustan.jpg"
                                } 
                                onError={(e) => {
                                    e.target.onerror = null; 
                                    if(tour.id === 1) e.target.src = "https://images.unsplash.com/photo-1647426867375-72810f5139f3?auto=format&fit=crop&q=80&w=600";
                                    if(tour.id === 2) e.target.src = "https://images.unsplash.com/photo-1669046779836-e074360e61d8?auto=format&fit=crop&q=80&w=600";
                                    if(tour.id === 3) e.target.src = "https://images.unsplash.com/photo-1629731633544-785311b51829?auto=format&fit=crop&q=80&w=600";
                                    if(tour.id === 4) e.target.src = "https://images.unsplash.com/photo-1621255562137-b952a578cb96?auto=format&fit=crop&q=80&w=600";
                                }}
                                alt={tour.title} 
                                className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                />
                                <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-sm font-bold text-slate-800 shadow-sm">
                                {tour.price}
                                </div>
                            </div>
                            <div className="p-6 flex-1 flex flex-col">
                                <h3 className="text-xl font-bold text-slate-900 mb-3 group-hover:text-sky-600 transition-colors">{tour.title}</h3>
                                <p className="text-slate-500 text-sm mb-6 flex-grow">{tour.desc}</p>
                                <div className="space-y-3 mb-6">
                                {tour.details.map((detail, i) => (
                                    <div key={i} className="flex items-center gap-2 text-xs font-medium text-slate-600 bg-slate-50 p-2 rounded-lg">
                                    <div className="w-1.5 h-1.5 bg-sky-500 rounded-full"></div>
                                    {detail}
                                    </div>
                                ))}
                                </div>
                                <button onClick={() => scrollToSection('contact')} className="w-full py-3 bg-slate-900 text-white font-semibold rounded-xl hover:bg-sky-600 transition-colors shadow-lg flex items-center justify-center gap-2">
                                {t.tours.bookBtn} <IconChevronRight size={16}/>
                                </button>
                            </div>
                            </div>
                        </RevealOnScroll>
                        ))}
                    </div>
                    </div>
                </section>

                {/* Testimonials */}
                <section className="py-24 bg-sky-900 text-white overflow-hidden relative">
                    <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-sky-900 to-slate-900"></div>
                    <div className="absolute top-10 left-10 w-64 h-64 bg-sky-600 rounded-full blur-[100px] opacity-30"></div>
                    <div className="absolute bottom-10 right-10 w-64 h-64 bg-orange-500 rounded-full blur-[100px] opacity-20"></div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                    <RevealOnScroll className="text-center mb-16">
                        <h2 className="text-3xl md:text-4xl font-bold mb-4">{t.testimonials.title}</h2>
                        <div className="flex justify-center gap-1">
                        {[1,2,3,4,5].map(s => <IconStar key={s} size={20} className="fill-orange-400 text-orange-400"/>)}
                        </div>
                    </RevealOnScroll>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {t.testimonials.reviews.map((review, idx) => (
                        <RevealOnScroll key={idx} delay={idx * 150}>
                            <div className="glass-card p-8 rounded-2xl relative">
                            <div className="absolute -top-4 left-8 text-6xl text-sky-400 font-serif opacity-50">"</div>
                            <p className="text-slate-700 italic mb-6 relative z-10 font-medium">
                                {review.text}
                            </p>
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 bg-gradient-to-br from-orange-400 to-red-500 rounded-full flex items-center justify-center font-bold text-white shadow-lg">
                                {review.name.charAt(0)}
                                </div>
                                <div>
                                <h4 className="font-bold text-slate-900 text-sm">{review.name}</h4>
                                <p className="text-slate-500 text-xs uppercase tracking-wide">{review.country}</p>
                                </div>
                            </div>
                            </div>
                        </RevealOnScroll>
                        ))}
                    </div>
                    </div>
                </section>

                {/* NEW PRICING SECTION */}
                <section id="pricing" className="py-24 bg-slate-50 relative">
                     <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                         <RevealOnScroll className="text-center mb-12">
                             <div className="inline-block px-3 py-1 bg-sky-100 text-sky-700 rounded-full text-xs font-bold uppercase mb-4">
                                <IconTag size={16} className="inline mr-1 mb-0.5"/>
                                Best Value
                             </div>
                             <h2 className="text-4xl md:text-5xl font-bold text-slate-900 mb-4">{t.pricing.title}</h2>
                             <p className="text-xl text-slate-500">{t.pricing.subtitle}</p>
                         </RevealOnScroll>

                         <RevealOnScroll delay={200}>
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-900 text-white">
                                                <th className="p-4 md:p-6 font-bold uppercase tracking-wider text-sm md:text-base border-b border-slate-800">{t.pricing.pax}</th>
                                                <th className="p-4 md:p-6 font-bold uppercase tracking-wider text-sm md:text-base border-b border-slate-800 bg-sky-900">{t.pricing.opA}</th>
                                                <th className="p-4 md:p-6 font-bold uppercase tracking-wider text-sm md:text-base border-b border-slate-800">{t.pricing.opB}</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {pricingData.map((row, index) => (
                                                <tr key={index} className={`border-b border-slate-50 transition-colors hover:bg-sky-50 ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50'}`}>
                                                    <td className="p-4 md:p-5 font-bold text-slate-800">{row.pax}</td>
                                                    <td className="p-4 md:p-5 text-slate-600 font-medium bg-sky-50/30">{row.opA}</td>
                                                    <td className="p-4 md:p-5 text-slate-600 font-medium">{row.opB}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                
                                <div className="p-6 md:p-8 bg-slate-50 border-t border-slate-200">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col h-full relative overflow-hidden group">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-sky-500"></div>
                                            <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{t.pricing.city}: {t.pricing.baku}</div>
                                            <h4 className="text-xl font-bold text-sky-700 mb-4">{t.pricing.opA}</h4>
                                            <div className="space-y-2 mb-4 flex-grow">
                                                <p className="font-semibold text-slate-800">{t.pricing.hotel5}</p>
                                            </div>
                                            <div className="pt-4 border-t border-slate-100">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-sm font-medium text-slate-500">{t.pricing.sngl}</span>
                                                    <span className="font-bold text-orange-600">{t.pricing.priceA}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col h-full relative overflow-hidden group">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-slate-400"></div>
                                            <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{t.pricing.city}: {t.pricing.baku}</div>
                                            <h4 className="text-xl font-bold text-slate-700 mb-4">{t.pricing.opB}</h4>
                                            <div className="space-y-2 mb-4 flex-grow">
                                                <p className="font-semibold text-slate-800">{t.pricing.hotel4}</p>
                                            </div>
                                            <div className="pt-4 border-t border-slate-100">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-sm font-medium text-slate-500">{t.pricing.sngl}</span>
                                                    <span className="font-bold text-orange-600">{t.pricing.priceB}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                         </RevealOnScroll>
                     </div>
                </section>

                {/* Contact Section */}
                <section id="contact" className="py-24 bg-slate-50">
                    <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                    <RevealOnScroll className="bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
                        <div className="md:w-5/12 bg-slate-900 text-white p-10 flex flex-col justify-between relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-40 h-40 bg-sky-600 rounded-full blur-[80px] opacity-50"></div>
                        
                        <div>
                            <h3 className="text-2xl font-bold mb-2">{t.contact.title}</h3>
                            <p className="text-slate-400 mb-8">{t.contact.subtitle}</p>
                            
                            <div className="space-y-6">
                            <div className="flex items-center gap-4 group">
                                <div className="bg-white/10 p-3 rounded-xl group-hover:bg-sky-600 transition-colors">
                                <IconMail size={20} />
                                </div>
                                <span className="text-sm">info@caspiandream.com</span>
                            </div>
                            <div className="flex items-center gap-4 group">
                                <div className="bg-white/10 p-3 rounded-xl group-hover:bg-sky-600 transition-colors">
                                <IconPhone size={20} />
                                </div>
                                <span className="text-sm">+994 50 000 00 00</span>
                            </div>
                            <div className="flex items-center gap-4 group">
                                <div className="bg-white/10 p-3 rounded-xl group-hover:bg-sky-600 transition-colors">
                                <IconMapPin size={20} />
                                </div>
                                <span className="text-sm">Baku, Azerbaijan</span>
                            </div>
                            </div>
                        </div>

                        <div className="mt-12 flex gap-4">
                            <a href="#" className="p-3 bg-white/10 rounded-full hover:bg-white hover:text-sky-900 transition-all"><IconInstagram size={20}/></a>
                            <a href="#" className="p-3 bg-white/10 rounded-full hover:bg-white hover:text-sky-900 transition-all"><IconFacebook size={20}/></a>
                        </div>
                        </div>

                        <div className="md:w-7/12 p-10">
                        <form onSubmit={(e) => { e.preventDefault(); alert(t.contact.success); }}>
                            <div className="grid grid-cols-2 gap-6 mb-6">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">{t.contact.name}</label>
                                <input type="text" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 focus:bg-white transition-all" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">{t.contact.email}</label>
                                <input type="email" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 focus:bg-white transition-all" />
                            </div>
                            </div>
                            <div className="mb-8">
                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">{t.contact.message}</label>
                            <textarea rows="4" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 focus:bg-white transition-all resize-none"></textarea>
                            </div>
                            <button type="submit" className="w-full bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold py-4 rounded-xl shadow-lg transform transition hover:-translate-y-1">
                            {t.contact.send}
                            </button>
                        </form>
                        </div>
                    </RevealOnScroll>
                    </div>
                </section>

                {/* Footer */}
                <footer className="bg-slate-900 text-slate-500 py-10 text-center text-sm border-t border-slate-800">
                    <div className="flex justify-center items-center gap-2 mb-4 opacity-50 grayscale hover:grayscale-0 transition-all">
                    <img src="image.png" alt="logo" className="h-8 rounded-full bg-white" onError={(e) => {e.target.style.display = 'none';}}/>
                    <span className="font-bold text-slate-300">CASPIAN DREAM</span>
                    </div>
                    <p>&copy; {new Date().getFullYear()} Caspian Dream Travel Agency.</p>
                    <div className="flex justify-center gap-6 mt-4">
                    <a href="#" className="hover:text-white transition-colors">Privacy</a>
                    <a href="#" className="hover:text-white transition-colors">Terms</a>
                    <a href="#" className="hover:text-white transition-colors">Support</a>
                    </div>
                </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
